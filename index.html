<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zep Prompter V6</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #f1c40f; --panel: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        
        #admin-panel { background: var(--panel); padding: 20px; min-height: 100vh; box-sizing: border-box; }
        .card { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 20px; position: relative; z-index: 10; }
        input, textarea { background: #111; color: #fff; border: 1px solid #444; padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; font-size: 1.1rem; border-radius: 4px; }
        
        /* iPadタップバグ対策：絶対的なクリック領域を確保 */
        button { 
            appearance: none; -webkit-appearance: none; touch-action: manipulation;
            background: #444; color: #fff; border: none; padding: 14px 20px; 
            font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1rem; margin: 5px; 
            position: relative; z-index: 20;
        }
        button:active { transform: scale(0.98); }
        button.primary { background: var(--accent); color: #000; }
        button.danger { background: #c0392b; }
        button.action { background: #2980b9; padding: 8px 12px; margin: 0 2px; }
        button.sync { background: #27ae60; width: 100%; margin-top: 10px; }
        .tap-btn { background: #9b59b6; color: white; height: 60px; }
        
        .song-item { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px; margin: 5px 0; border-radius: 5px; }
        
        #live-view { display: none; padding: 120px 50px 500px 50px; text-align: center; -webkit-user-select: none; user-select: none; }
        #lyrics-display { line-height: 1.4; font-weight: bold; white-space: pre-wrap; }
        #live-nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px 10px; display: none; z-index: 1000; gap: 10px; overflow-x: auto; border-bottom: 2px solid #333; }
        .song-btn { background: #444; color: white; padding: 12px 25px; border-radius: 5px; font-size: 1.2rem; font-weight: bold; white-space: nowrap; }
        .active-song { background: var(--accent); color: black; }
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; opacity: 0.3; transition: 0.3s; z-index: 1000; }
        .controls:hover { opacity: 1; }
        .highlight { color: var(--accent); }
    </style>
</head>
<body>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Zep Prompter V6</h2>
        <button id="btn-start-live" class="primary" style="font-size: 1.2rem; padding: 15px 30px;">🚀 LIVE START</button>
    </div>

    <div class="card" style="border: 2px solid #27ae60;">
        <h3 style="color: #27ae60;">☁️ クラウド同期 (Mac ⇄ iPad)</h3>
        <p style="font-size: 0.9rem; color: #ccc;">GASのWebアプリURLを入力して同期します。</p>
        <input type="password" id="gas-url" placeholder="https://script.google.com/macros/s/---/exec">
        <div style="display: flex; gap: 10px;">
            <button id="btn-sync-up" class="sync">☁️ Macからクラウドへ保存</button>
            <button id="btn-sync-down" class="sync" style="background:#2980b9;">☁️ クラウドからiPadへ読込</button>
        </div>
        <p id="sync-status" style="color: #f1c40f; font-weight: bold; text-align: center; margin-top: 10px;"></p>
    </div>

    <div class="card">
        <h3 id="form-title">🎵 曲の追加・編集</h3>
        <input type="hidden" id="edit-index" value="-1">
        <input type="text" id="song-title" placeholder="曲名（例：Custard Pie）">
        <textarea id="song-lyrics" rows="6" placeholder="歌詞入力 ( [ハーモニカ] で黄色くハイライト)"></textarea>
        
        <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
            <div style="flex: 1;">
                <label>スクロール速度: <br><input type="number" id="song-speed" value="5"></label>
            </div>
            <button id="btn-tap-tempo" class="tap-btn" style="flex: 1;">👆 TAP TEMPO</button>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="btn-save-song" class="primary" style="flex: 2;">保存して更新</button>
            <button id="btn-clear-form" style="flex: 1;">クリア</button>
        </div>
    </div>

    <div class="card">
        <h3>⚙️ 文字サイズ</h3>
        <input type="number" id="global-font-size" value="80">
    </div>

    <div class="card">
        <h3>📋 セットリスト</h3>
        <div id="setlist-container"></div>
    </div>
</div>

<div id="live-nav"></div>
<div id="live-view">
    <div id="lyrics-display"></div>
    <div class="controls">
        <button id="btn-live-tap" class="tap-btn">👆 TAP TEMPO</button>
        <button id="btn-toggle-scroll" class="primary">AUTO SCROLL: OFF</button>
        <button id="btn-exit-live" class="danger">EXIT LIVE MODE</button>
    </div>
</div>

<script>
    // --- グローバル変数 ---
    let appData = { settings: { fontSize: 80 }, setlist: [], gasUrl: "" };
    let currentSongIndex = 0;
    let isAutoScrolling = false;
    let scrollAnimationFrame;
    let tapTimes = [];
    let tapTimeout;

    // --- 初期化処理（iPadの読み込みエラー対策） ---
    window.onload = () => {
        try {
            const savedData = localStorage.getItem('zepAppData');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                if (parsed.setlist) appData = parsed;
            }
        } catch (e) { console.error(e); }
        
        document.getElementById('global-font-size').value = appData.settings?.fontSize || 80;
        document.getElementById('gas-url').value = appData.gasUrl || "";
        renderSetlist();
        bindEvents();
    };

    function saveData() {
        appData.settings.fontSize = parseInt(document.getElementById('global-font-size').value) || 80;
        appData.gasUrl = document.getElementById('gas-url').value;
        localStorage.setItem('zepAppData', JSON.stringify(appData));
    }

    // --- イベントバインディング（確実なタップ判定） ---
    function bindEvents() {
        document.getElementById('btn-save-song').addEventListener('click', saveSong);
        document.getElementById('btn-clear-form').addEventListener('click', clearForm);
        document.getElementById('btn-start-live').addEventListener('click', startLiveMode);
        document.getElementById('btn-exit-live').addEventListener('click', exitLiveMode);
        document.getElementById('btn-toggle-scroll').addEventListener('click', toggleAutoScroll);
        document.getElementById('btn-tap-tempo').addEventListener('click', () => handleTapTempo(false));
        document.getElementById('btn-live-tap').addEventListener('click', () => handleTapTempo(true));
        document.getElementById('btn-sync-up').addEventListener('click', syncUp);
        document.getElementById('btn-sync-down').addEventListener('click', syncDown);
        document.getElementById('global-font-size').addEventListener('change', saveData);
    }

    // --- 曲の管理 ---
    function saveSong() {
        const title = document.getElementById('song-title').value.trim();
        const lyrics = document.getElementById('song-lyrics').value;
        const speed = parseFloat(document.getElementById('song-speed').value) || 5;
        const editIndex = parseInt(document.getElementById('edit-index').value);

        if (!title) return alert("曲名を入力してください！");

        const songObj = { title, lyrics, speed };
        if (editIndex >= 0) appData.setlist[editIndex] = songObj;
        else appData.setlist.push(songObj);
        
        saveData(); renderSetlist(); clearForm();
        alert("保存しました！");
    }

    function clearForm() {
        document.getElementById('edit-index').value = "-1";
        document.getElementById('song-title').value = '';
        document.getElementById('song-lyrics').value = '';
        document.getElementById('song-speed').value = '5';
        document.getElementById('form-title').innerText = "🎵 曲の追加";
    }

    window.editSong = function(index) {
        const song = appData.setlist[index];
        document.getElementById('edit-index').value = index;
        document.getElementById('song-title').value = song.title;
        document.getElementById('song-lyrics').value = song.lyrics;
        document.getElementById('song-speed').value = song.speed;
        document.getElementById('form-title').innerText = "✏️ 編集: " + song.title;
        window.scrollTo(0, 0);
    };

    window.deleteSong = function(index) {
        if(confirm("削除しますか？")) {
            appData.setlist.splice(index, 1);
            saveData(); renderSetlist(); clearForm();
        }
    };

    window.moveSong = function(index, direction) {
        if (direction === -1 && index > 0) {
            [appData.setlist[index - 1], appData.setlist[index]] = [appData.setlist[index], appData.setlist[index - 1]];
        } else if (direction === 1 && index < appData.setlist.length - 1) {
            [appData.setlist[index + 1], appData.setlist[index]] = [appData.setlist[index], appData.setlist[index + 1]];
        }
        saveData(); renderSetlist();
    };

    function renderSetlist() {
        const container = document.getElementById('setlist-container');
        if(appData.setlist.length === 0) return container.innerHTML = "<p>曲がありません。</p>";
        container.innerHTML = appData.setlist.map((song, index) => `
            <div class="song-item">
                <div style="font-weight:bold; flex:1;">${index + 1}. ${song.title}</div>
                <div>
                    <button class="action" onclick="moveSong(${index}, -1)">▲</button>
                    <button class="action" onclick="moveSong(${index}, 1)">▼</button>
                    <button class="action" onclick="editSong(${index})">編集</button>
                    <button class="action danger" onclick="deleteSong(${index})">削除</button>
                </div>
            </div>
        `).join('');
    }

    // --- タップテンポ ---
    function handleTapTempo(isLiveMode) {
        const now = Date.now();
        tapTimes.push(now);
        if (tapTimes.length > 4) tapTimes.shift();

        const btnElement = document.getElementById(isLiveMode ? 'btn-live-tap' : 'btn-tap-tempo');
        if (tapTimes.length > 1) {
            const intervals = tapTimes.slice(1).map((t, i) => t - tapTimes[i]);
            const bpm = 60000 / (intervals.reduce((a, b) => a + b) / intervals.length);
            let newSpeed = Math.max(1, Math.min(20, Math.round(bpm / 12)));
            
            btnElement.innerText = `BPM: ${Math.round(bpm)}`;
            if (isLiveMode) { appData.setlist[currentSongIndex].speed = newSpeed; saveData(); } 
            else { document.getElementById('song-speed').value = newSpeed; }

            clearTimeout(tapTimeout);
            tapTimeout = setTimeout(() => { btnElement.innerText = "👆 TAP TEMPO"; tapTimes = []; }, 2000);
        } else {
            btnElement.innerText = "TAP...";
        }
    }

    // --- ライブモード ---
    function startLiveMode() {
        if (appData.setlist.length === 0) return alert("曲を追加してください！");
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('live-view').style.display = 'block';
        document.getElementById('live-nav').style.display = 'flex';
        document.getElementById('lyrics-display').style.fontSize = (appData.settings.fontSize || 80) + 'px';
        loadLiveSong(0);
    }

    window.loadLiveSong = function(index) {
        currentSongIndex = index;
        const song = appData.setlist[index];
        const formattedLyrics = song.lyrics.replace(/\[(.*?)\]/g, '<span class="highlight">[$1]</span>');
        document.getElementById('lyrics-display').innerHTML = `<div style="color:var(--accent); margin-bottom:40px; border-bottom:2px solid #555; padding-bottom:20px;">${song.title}</div>${formattedLyrics}`;
        window.scrollTo(0, 0);
        isAutoScrolling = false; cancelAnimationFrame(scrollAnimationFrame);
        document.getElementById('btn-toggle-scroll').innerText = "AUTO SCROLL: OFF";
        document.getElementById('live-nav').innerHTML = appData.setlist.map((s, i) => `<div class="song-btn ${i === currentSongIndex ? 'active-song' : ''}" onclick="loadLiveSong(${i})">${i + 1}. ${s.title}</div>`).join('');
    };

    function toggleAutoScroll() {
        isAutoScrolling = !isAutoScrolling;
        document.getElementById('btn-toggle-scroll').innerText = `AUTO SCROLL: ${isAutoScrolling ? 'ON' : 'OFF'}`;
        if (isAutoScrolling) autoScroll(); else cancelAnimationFrame(scrollAnimationFrame);
    }

    function autoScroll() {
        if (!isAutoScrolling) return;
        window.scrollBy(0, appData.setlist[currentSongIndex].speed / 10);
        scrollAnimationFrame = requestAnimationFrame(autoScroll);
    }

    function exitLiveMode() {
        isAutoScrolling = false; cancelAnimationFrame(scrollAnimationFrame);
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('live-view').style.display = 'none';
        document.getElementById('live-nav').style.display = 'none';
    }

    // --- クラウド同期 (GAS) ---
    async function syncUp() {
        saveData();
        const url = appData.gasUrl;
        const status = document.getElementById('sync-status');
        if(!url) return alert("GASのURLを入力してください");
        status.innerText = "送信中...";
        try {
            await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(appData) });
            status.innerText = "✅ Macからクラウドへ保存完了！";
        } catch(e) { status.innerText = "❌ エラーが発生しました"; alert(e); }
    }

    async function syncDown() {
        const url = document.getElementById('gas-url').value;
        const status = document.getElementById('sync-status');
        if(!url) return alert("GASのURLを入力してください");
        status.innerText = "受信中...";
        try {
            const res = await fetch(url);
            const data = await res.json();
            if(data && data.setlist) {
                appData = data; saveData(); renderSetlist();
                status.innerText = "✅ クラウドからiPadへ読み込み完了！";
            } else { status.innerText = "❌ データが空です"; }
        } catch(e) { status.innerText = "❌ エラーが発生しました"; alert(e); }
    }

    // --- ペダル操作 ---
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('live-view').style.display === 'block') {
            const step = window.innerHeight * 0.4;
            if (e.key === 'ArrowDown' || e.key === 'PageDown') { e.preventDefault(); window.scrollBy({ top: step, behavior: 'smooth' }); } 
            else if (e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); window.scrollBy({ top: -step, behavior: 'smooth' }); } 
            else if (e.key === 'ArrowRight') { if (currentSongIndex < appData.setlist.length - 1) loadLiveSong(currentSongIndex + 1); } 
            else if (e.key === 'ArrowLeft') { if (currentSongIndex > 0) loadLiveSong(currentSongIndex - 1); } 
            else if (e.key === ' ') { e.preventDefault(); toggleAutoScroll(); }
        }
    });
</script>
</body>
</html>
