<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Zep Prompter V10</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #f1c40f; --panel: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        #admin-panel { background: var(--panel); padding: 20px; min-height: 100vh; box-sizing: border-box; }
        .card { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, textarea { background: #111; color: #fff; border: 1px solid #444; padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; font-size: 1.1rem; border-radius: 4px; }
        button { touch-action: manipulation; background: #444; color: #fff; border: none; padding: 14px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1rem; margin: 5px; }
        button.primary { background: var(--accent); color: #000; }
        button.danger { background: #c0392b; }
        button.action { background: #2980b9; padding: 8px 12px; }
        .song-item { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px; margin: 5px 0; border-radius: 5px; }
        
        #live-view { display: none; padding: 100px 50px 600px 50px; text-align: center; position: relative; }
        #lyrics-display { line-height: 1.4; font-weight: bold; white-space: pre-wrap; }
        
        /* ライブ中の曲選択ナビ（半透明） */
        #live-nav { 
            position: fixed; top: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.4); /* 背景をさらに薄く */
            padding: 10px; display: none; z-index: 1500; 
            gap: 8px; overflow-x: auto; border-bottom: 1px solid rgba(255,255,255,0.1);
            scrollbar-width: none; /* Firefox用 */
        }
        #live-nav::-webkit-scrollbar { display: none; } /* Safari用 */

        .song-btn-mini { 
            background: rgba(68, 68, 68, 0.5); color: rgba(255,255,255,0.7); 
            padding: 8px 15px; border-radius: 4px; white-space: nowrap; font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .active-song-mini { background: var(--accent); color: #000; font-weight: bold; }

        #btn-exit-live {
            position: fixed; top: 15px; right: 15px; z-index: 2000;
            background: rgba(192, 57, 43, 0.4); color: white; border: 1px solid #fff;
            padding: 5px 10px; font-size: 0.8rem;
        }
        
        #command-indicator { 
            position: fixed; bottom: 30px; left: 30px; 
            font-family: monospace; font-size: 1.2rem; 
            color: var(--accent); background: rgba(0,0,0,0.3);
            padding: 5px 15px; border-radius: 20px; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Zep Prompter V10</h2>
        <button id="btn-start-live" class="primary">🚀 LIVE START</button>
    </div>

    <div class="card">
        <h3>☁️ クラウド同期</h3>
        <input type="password" id="gas-url" placeholder="GAS URL">
        <div style="display: flex; gap: 5px;">
            <button id="btn-sync-up" style="flex:1;">☁️ Mac → クラウド</button>
            <button id="btn-sync-down" style="flex:1; background:#2980b9;">☁️ クラウド → iPad</button>
        </div>
        <p id="sync-status" style="text-align:center; color:var(--accent);"></p>
    </div>

    <div class="card">
        <h3>⚙️ 文字サイズ (px)</h3>
        <input type="number" id="global-font-size" value="80">
    </div>

    <div class="card">
        <h3 id="form-title">🎵 曲の追加・編集</h3>
        <input type="hidden" id="edit-index" value="-1">
        <input type="text" id="song-title" placeholder="曲名">
        <textarea id="song-lyrics" rows="6" placeholder="歌詞入力 [ハーモニカ]"></textarea>
        <label>スクロール速度 (1〜20): <input type="number" id="song-speed" value="5"></label>
        <button id="btn-save-song" class="primary" style="width:100%;">保存</button>
    </div>

    <div class="card"><h3>📋 セットリスト</h3><div id="setlist-container"></div></div>
</div>

<div id="live-nav"></div>
<div id="live-view">
    <button id="btn-exit-live">EXIT</button>
    <div id="lyrics-display"></div>
    <div id="command-indicator"></div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=10');
    }

    let appData = { settings: { fontSize: 80 }, setlist: [], gasUrl: "" };
    let currentSongIndex = 0;
    let commandHistory = "";
    let commandTimer;
    const NEXT_COMMAND = "RRLLRL";
    const PREV_COMMAND = "LLRRLR";

    window.onload = () => {
        const saved = localStorage.getItem('zepAppData');
        if (saved) {
            appData = JSON.parse(saved);
            document.getElementById('global-font-size').value = appData.settings?.fontSize || 80;
            document.getElementById('gas-url').value = appData.gasUrl || "";
        }
        renderSetlist();
        bindEvents();
    };

    function saveData() {
        appData.settings.fontSize = parseInt(document.getElementById('global-font-size').value);
        appData.gasUrl = document.getElementById('gas-url').value;
        localStorage.setItem('zepAppData', JSON.stringify(appData));
    }

    function renderSetlist() {
        const container = document.getElementById('setlist-container');
        container.innerHTML = appData.setlist.map((s, i) => `
            <div class="song-item">
                <div style="font-weight:bold;">${i + 1}. ${s.title}</div>
                <div>
                    <button class="action" onclick="moveSong(${i}, -1)">▲</button>
                    <button class="action" onclick="moveSong(${i}, 1)">▼</button>
                    <button class="action" onclick="editSong(${i})">編集</button>
                    <button class="action danger" onclick="deleteSong(${i})">削除</button>
                </div>
            </div>
        `).join('');
    }

    function bindEvents() {
        document.getElementById('btn-start-live').onclick = startLiveMode;
        document.getElementById('btn-exit-live').onclick = exitLiveMode;
        document.getElementById('btn-save-song').onclick = saveSong;
        document.getElementById('btn-sync-up').onclick = syncUp;
        document.getElementById('btn-sync-down').onclick = syncDown;
    }

    function saveSong() {
        const title = document.getElementById('song-title').value.trim();
        const lyrics = document.getElementById('song-lyrics').value;
        const speed = parseFloat(document.getElementById('song-speed').value) || 5;
        const editIndex = parseInt(document.getElementById('edit-index').value);
        if (!title) return alert("曲名を入力！");
        const obj = { title, lyrics, speed };
        if (editIndex >= 0) appData.setlist[editIndex] = obj;
        else appData.setlist.push(obj);
        saveData(); renderSetlist(); clearForm();
    }

    function clearForm() {
        document.getElementById('edit-index').value = "-1";
        document.getElementById('song-title').value = '';
        document.getElementById('song-lyrics').value = '';
        document.getElementById('form-title').innerText = "🎵 曲の追加・編集";
    }

    window.editSong = (i) => {
        const s = appData.setlist[i];
        document.getElementById('edit-index').value = i;
        document.getElementById('song-title').value = s.title;
        document.getElementById('song-lyrics').value = s.lyrics;
        document.getElementById('song-speed').value = s.speed;
        document.getElementById('form-title').innerText = "✏️ 編集: " + s.title;
        window.scrollTo(0, 0);
    };

    window.moveSong = (i, d) => {
        if (d === -1 && i > 0) [appData.setlist[i-1], appData.setlist[i]] = [appData.setlist[i], appData.setlist[i-1]];
        if (d === 1 && i < appData.setlist.length - 1) [appData.setlist[i+1], appData.setlist[i]] = [appData.setlist[i], appData.setlist[i+1]];
        saveData(); renderSetlist();
    };

    window.deleteSong = (i) => { if(confirm("削除？")) { appData.setlist.splice(i, 1); saveData(); renderSetlist(); } };

    function startLiveMode() {
        if (appData.setlist.length === 0) return alert("曲がない！");
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('live-view').style.display = 'block';
        document.getElementById('live-nav').style.display = 'flex';
        document.getElementById('lyrics-display').style.fontSize = appData.settings.fontSize + 'px';
        loadLiveSong(0);
    }

    window.loadLiveSong = (i) => {
        currentSongIndex = i;
        const s = appData.setlist[i];
        document.getElementById('lyrics-display').innerHTML = `
            <div style="color:var(--accent); border-bottom:1px solid #444; margin-bottom:30px; padding-bottom:15px;">${s.title}</div>
            ${s.lyrics.replace(/\[(.*?)\]/g, '<span class="highlight">[$1]</span>')}
        `;
        window.scrollTo(0, 0);
        updateLiveNav();
    };

    function updateLiveNav() {
        const nav = document.getElementById('live-nav');
        nav.innerHTML = appData.setlist.map((s, i) => `
            <div class="song-btn-mini ${i === currentSongIndex ? 'active-song-mini' : ''}" onclick="loadLiveSong(${i})">
                ${i + 1}. ${s.title}
            </div>
        `).join('');
    }

    function exitLiveMode() {
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('live-view').style.display = 'none';
        document.getElementById('live-nav').style.display = 'none';
    }

    async function syncUp() {
        saveData();
        const url = appData.gasUrl;
        if(!url) return alert("URL未入力");
        document.getElementById('sync-status').innerText = "送信中...";
        try {
            await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(appData) });
            document.getElementById('sync-status').innerText = "✅ 送信成功";
        } catch(e) { document.getElementById('sync-status').innerText = "❌ 送信失敗"; }
    }

    async function syncDown() {
        const url = document.getElementById('gas-url').value;
        if(!url) return alert("URL未入力");
        document.getElementById('sync-status').innerText = "受信中...";
        try {
            const res = await fetch(url);
            const data = await res.json();
            if(data.setlist) { appData = data; saveData(); renderSetlist(); document.getElementById('sync-status').innerText = "✅ 受信成功"; }
        } catch(e) { document.getElementById('sync-status').innerText = "❌ 受信失敗"; }
    }

    // --- キー＆ペダル操作 ---
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('live-view').style.display !== 'block') return;

        if (e.key === 'ArrowRight') {
            if (currentSongIndex < appData.setlist.length - 1) loadLiveSong(currentSongIndex + 1);
            return;
        }
        if (e.key === 'ArrowLeft') {
            if (currentSongIndex > 0) loadLiveSong(currentSongIndex - 1);
            return;
        }
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
            e.preventDefault();
            return;
        }

        let input = "";
        if (e.key === 'PageDown' || e.key === ' ') input = "R";
        if (e.key === 'PageUp') input = "L";

        if (input) {
            commandHistory += input;
            const indicator = document.getElementById('command-indicator');
            indicator.innerText = "COMMAND: " + commandHistory;
            indicator.style.display = "block";

            clearTimeout(commandTimer);
            commandTimer = setTimeout(() => {
                // スクロール幅を今の6割（0.2 -> 0.12）に設定
                if (commandHistory === "R") window.scrollBy({ top: window.innerHeight * 0.12, behavior: 'smooth' });
                if (commandHistory === "L") window.scrollBy({ top: -window.innerHeight * 0.12, behavior: 'smooth' });
                
                commandHistory = "";
                indicator.style.display = "none";
            }, 500);

            if (commandHistory === NEXT_COMMAND) {
                if (currentSongIndex < appData.setlist.length - 1) loadLiveSong(currentSongIndex + 1);
                commandHistory = ""; indicator.style.display = "none";
            }
            if (commandHistory === PREV_COMMAND) {
                if (currentSongIndex > 0) loadLiveSong(currentSongIndex - 1);
                commandHistory = ""; indicator.style.display = "none";
            }
        }
    });
</script>
</body>
</html>
